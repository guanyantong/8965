name: Cloudflare IP Filter

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  run-filter:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: 📝 拉取仓库代码
      uses: actions/checkout@v4

    - name: 🐍 准备 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 🚀 运行全球节点排雷脚本
      run: python filter.py

    - name: 💾 检查并安全提交文件
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 增加判断：只有文件真的存在时才执行上传，避免报 128 错误
        if [ -f "ip_list.txt" ]; then
          git add ip_list.txt
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "自动更新优选全球IP列表"
            git push origin HEAD:main
          else
            echo "文件内容无变动，跳过本次提交。"
          fi
        else
          echo "❌ 严重错误：未找到生成的 ip_list.txt 文件，脚本可能未正常运行！"
          exit 1
        fi
